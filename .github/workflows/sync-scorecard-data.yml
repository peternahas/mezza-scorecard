name: Sync scorecard data from Excel

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes — adjust to taste (e.g. "0 * * * *" for hourly)
  workflow_dispatch: {}       # adds a manual "Run workflow" button for testing

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull latest data from Excel via Microsoft Graph
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          GRAPH_SHARE_URL: ${{ secrets.GRAPH_SHARE_URL }}
        run: node scripts/sync-excel-to-json.mjs

      - name: Commit changes if data updated
        run: |
          git config user.name "mezza-scorecard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/scorecard-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync scorecard data from Excel ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
            git push
          fi
